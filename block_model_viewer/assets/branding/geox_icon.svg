<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- GeoX Professional Icon -->
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a5298;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3c72;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for 3D blocks -->
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for grid -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.2"/>
  
  <!-- 3D Block Model Representation -->
  <g transform="translate(256, 256)">
    <!-- Base grid layer (back) -->
    <g opacity="0.4">
      <rect x="-120" y="60" width="80" height="80" fill="url(#gridGrad)" rx="4"/>
      <rect x="-20" y="60" width="80" height="80" fill="url(#gridGrad)" rx="4"/>
      <rect x="80" y="60" width="80" height="80" fill="url(#gridGrad)" rx="4"/>
      <rect x="-120" y="160" width="80" height="80" fill="url(#gridGrad)" rx="4"/>
      <rect x="-20" y="160" width="80" height="80" fill="url(#gridGrad)" rx="4"/>
      <rect x="80" y="160" width="80" height="80" fill="url(#gridGrad)" rx="4"/>
    </g>
    
    <!-- Middle grid layer -->
    <g opacity="0.6">
      <rect x="-100" y="20" width="60" height="60" fill="url(#gridGrad)" rx="4"/>
      <rect x="-20" y="20" width="60" height="60" fill="url(#gridGrad)" rx="4"/>
      <rect x="60" y="20" width="60" height="60" fill="url(#gridGrad)" rx="4"/>
      <rect x="-100" y="100" width="60" height="60" fill="url(#gridGrad)" rx="4"/>
      <rect x="-20" y="100" width="60" height="60" fill="url(#gridGrad)" rx="4"/>
      <rect x="60" y="100" width="60" height="60" fill="url(#gridGrad)" rx="4"/>
    </g>
    
    <!-- Top layer - highlighted blocks (ore) -->
    <g>
      <!-- High-grade blocks -->
      <rect x="-80" y="-20" width="40" height="40" fill="url(#blockGrad)" rx="3"/>
      <rect x="-20" y="-20" width="40" height="40" fill="url(#blockGrad)" rx="3"/>
      <rect x="40" y="-20" width="40" height="40" fill="url(#blockGrad)" rx="3"/>
      <rect x="-80" y="40" width="40" height="40" fill="url(#blockGrad)" rx="3"/>
      <rect x="-20" y="40" width="40" height="40" fill="url(#blockGrad)" rx="3"/>
      
      <!-- Highlight on top blocks -->
      <rect x="-80" y="-20" width="40" height="12" fill="#ffffff" opacity="0.3" rx="3"/>
      <rect x="-20" y="-20" width="40" height="12" fill="#ffffff" opacity="0.3" rx="3"/>
      <rect x="40" y="-20" width="40" height="12" fill="#ffffff" opacity="0.3" rx="3"/>
      <rect x="-80" y="40" width="40" height="12" fill="#ffffff" opacity="0.3" rx="3"/>
      <rect x="-20" y="40" width="40" height="12" fill="#ffffff" opacity="0.3" rx="3"/>
    </g>
    
    <!-- Grid lines overlay -->
    <g stroke="#ffffff" stroke-width="2" opacity="0.3" fill="none">
      <!-- Vertical lines -->
      <line x1="-120" y1="-40" x2="-120" y2="240"/>
      <line x1="-40" y1="-40" x2="-40" y2="240"/>
      <line x1="40" y1="-40" x2="40" y2="240"/>
      <line x1="120" y1="-40" x2="120" y2="240"/>
      <!-- Horizontal lines -->
      <line x1="-120" y1="-40" x2="120" y2="-40"/>
      <line x1="-120" y1="40" x2="120" y2="40"/>
      <line x1="-120" y1="120" x2="120" y2="120"/>
      <line x1="-120" y1="200" x2="120" y2="200"/>
    </g>
  </g>
  
  <!-- GeoX Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.95">GeoX</text>
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.7">Geostatistics</text>
</svg>
