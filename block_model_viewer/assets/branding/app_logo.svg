<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- BlockModelViewer Logo -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980B9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ABC9C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#grad1)"/>
  
  <!-- 3D Cube Representation -->
  <g transform="translate(512, 512)">
    <!-- Back face -->
    <polygon points="-200,-200 200,-200 200,200 -200,200" fill="#34495E" opacity="0.6"/>
    <!-- Top face -->
    <polygon points="-200,-200 200,-200 100,-100 -100,-100" fill="#2C3E50" opacity="0.8"/>
    <!-- Right face -->
    <polygon points="200,-200 200,200 100,100 100,-100" fill="#1A252F" opacity="0.7"/>
    <!-- Grid lines -->
    <line x1="-200" y1="-200" x2="200" y2="-200" stroke="#ECF0F1" stroke-width="8"/>
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#ECF0F1" stroke-width="8"/>
    <line x1="-200" y1="200" x2="200" y2="200" stroke="#ECF0F1" stroke-width="8"/>
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#ECF0F1" stroke-width="8"/>
    <line x1="200" y1="-200" x2="200" y2="200" stroke="#ECF0F1" stroke-width="8"/>
  </g>
  
  <!-- Text -->
  <text x="512" y="800" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#ECF0F1" text-anchor="middle">BMV</text>
</svg>

