name: Release - Build, Sign, Publish

on:
  workflow_dispatch:

jobs:
  release-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller numpy

      - name: Run tests
        run: |
          pip install pytest
          pytest -q

      - name: Build (PyInstaller)
        run: |
          pyinstaller GeoX.spec

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-dist-${{ matrix.os }}
          path: dist/

  sign-and-publish:
    needs: release-build
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-dist-windows-latest

      - name: Prepare signing certificate
        env:
          SIGNING_PFX: ${{ secrets.SIGNING_PFX }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          if (-not $env:SIGNING_PFX) { Write-Error 'SIGNING_PFX not set'; exit 1 }
          [System.IO.File]::WriteAllBytes('cert.pfx', [System.Convert]::FromBase64String($env:SIGNING_PFX))

      - name: Sign executable (Windows)
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          # signtool must be available on runner. This is a placeholder command.
          $signtool = '"C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"'
          if (-Not (Test-Path $signtool)) { Write-Host 'signtool not found - ensure Windows SDK is available' }
          & $signtool sign /f cert.pfx /p $env:SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\GeoX.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload signed artifact to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/GeoX.exe
          asset_name: GeoX-${{ github.run_number }}.exe
          asset_content_type: application/octet-stream
